services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    env_file:
      - environment.env
    environment:
      - ACCEPT_EULA=Y
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql

  app:
    build: .
    image: shopmgr:latest
    ports:
      - "3000:80"
    env_file:
      - environment.env
    volumes:
      - imagenes:/app/imagenes
    depends_on:
      - db

  seeder:
    build: .
    entrypoint: ["dotnet", "DBSeeder.dll"]
    env_file:
      - environment.env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - db
    profiles:
      - tools

volumes:
  mssql_data:
  imagenes:
